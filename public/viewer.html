<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Take over · volleybot</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #0b0d10; color: #e7ecf2;
        font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; overflow: hidden; }
      #bar { display: flex; align-items: center; gap: 12px; padding: 8px 12px;
        background: #14181d; border-bottom: 1px solid #232a31; position: sticky; top: 0; z-index: 2; }
      #bar .reason { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #9fb0c0; }
      #dot { width: 9px; height: 9px; border-radius: 50%; background: #e0a52b; flex: none; }
      #dot.live { background: #35c759; }
      #dot.done { background: #4b5563; }
      button#resume { appearance: none; border: 0; border-radius: 8px; padding: 8px 14px;
        font-weight: 600; background: #2f6df6; color: #fff; cursor: pointer; flex: none; }
      button#resume:disabled { background: #2b3a4a; color: #7c8894; cursor: default; }
      #stage { position: absolute; inset: 44px 0 0 0; display: grid; place-items: center; background: #0b0d10; }
      canvas { max-width: 100%; max-height: 100%; touch-action: none; cursor: crosshair;
        box-shadow: 0 0 0 1px #232a31; background: #fff; }
      #hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
        background: #14181dcc; border: 1px solid #232a31; border-radius: 999px; padding: 6px 14px;
        color: #9fb0c0; font-size: 12px; z-index: 2; }
    </style>
  </head>
  <body>
    <div id="bar">
      <span id="dot" title="connection"></span>
      <span class="reason" id="reason">Connecting…</span>
      <button id="resume" disabled>✓ Solved — resume agent</button>
    </div>
    <div id="stage"><canvas id="screen" width="1280" height="800"></canvas></div>
    <div id="hint">✋ one finger: tap &amp; drag&nbsp;&nbsp;·&nbsp;&nbsp;✌️ two fingers: scroll&nbsp;&nbsp;·&nbsp;&nbsp;then tap Resume</div>

    <script>
      const token = location.pathname.split('/').pop();
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const canvas = document.getElementById('screen');
      const ctx = canvas.getContext('2d');
      const dot = document.getElementById('dot');
      const reasonEl = document.getElementById('reason');
      const resumeBtn = document.getElementById('resume');
      let ws, done = false;

      // ---- rendering ------------------------------------------------------
      const img = new Image();
      let pending = null, drawing = false;
      img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); drawing = false; if (pending) flush(); };
      function flush() { if (drawing || !pending) return; drawing = true; const d = pending; pending = null; img.src = 'data:image/jpeg;base64,' + d; }
      function onFrame(data, meta) {
        if (meta && meta.deviceWidth && (canvas.width !== meta.deviceWidth || canvas.height !== meta.deviceHeight)) {
          canvas.width = meta.deviceWidth; canvas.height = meta.deviceHeight;
        }
        pending = data; flush();
      }

      // ---- coordinate mapping (display px -> page css px) -----------------
      // Map into the canvas's own pixel space, which we size to each frame's
      // deviceWidth/Height (the page's real CSS viewport). This stays correct no
      // matter what the attached browser's viewport is — the earlier bug was
      // assuming a fixed 1280x800, which mis-aimed every tap on a phone.
      function toPage(e) {
        const r = canvas.getBoundingClientRect();
        const w = canvas.width, h = canvas.height;
        const x = Math.max(0, Math.min(w, ((e.clientX - r.left) / r.width) * w));
        const y = Math.max(0, Math.min(h, ((e.clientY - r.top) / r.height) * h));
        return { x, y };
      }
      function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

      // ---- input ----------------------------------------------------------
      // 1 finger / mouse = interact (click, drag). 2 fingers = scroll (there's
      // no wheel on touch, so a one-finger drag can't scroll a page — it just
      // drags). This mirrors how remote-desktop web clients handle it.
      const pointers = new Map();      // pointerId -> {x, y} (client px)
      let lastMove = 0, downPos = null, scrolling = false, scrollAt = null;

      function centroid() {
        let x = 0, y = 0; for (const p of pointers.values()) { x += p.x; y += p.y; }
        const n = pointers.size || 1; return { x: x / n, y: y / n };
      }
      function toPageXY(cx, cy) {
        const r = canvas.getBoundingClientRect();
        return {
          x: Math.max(0, Math.min(canvas.width, (cx - r.left) / r.width * canvas.width)),
          y: Math.max(0, Math.min(canvas.height, (cy - r.top) / r.height * canvas.height)),
        };
      }

      canvas.addEventListener('pointerdown', (e) => {
        canvas.setPointerCapture(e.pointerId);
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (pointers.size === 1) { downPos = toPage(e); send({ type: 'mousedown', ...downPos }); }
        else if (pointers.size === 2) { // a 2nd finger means "scroll", not "click"
          if (downPos) { send({ type: 'mouseup', ...downPos }); downPos = null; }
          scrolling = true; scrollAt = centroid();
        }
        e.preventDefault();
      });
      canvas.addEventListener('pointermove', (e) => {
        if (!pointers.has(e.pointerId)) return;
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (scrolling && pointers.size >= 2) {
          const c = centroid(), r = canvas.getBoundingClientRect();
          const dx = c.x - scrollAt.x, dy = c.y - scrollAt.y; scrollAt = c;
          const at = toPageXY(c.x, c.y);
          // natural: drag down → page content follows down (wheel up)
          send({ type: 'wheel', x: at.x, y: at.y,
            deltaX: -dx * (canvas.width / r.width), deltaY: -dy * (canvas.height / r.height) });
        } else if (pointers.size === 1 && !scrolling) {
          const now = performance.now(); if (now - lastMove < 25) return; lastMove = now;
          send({ type: 'mousemove', ...toPage(e) });
        }
        e.preventDefault();
      });
      function endPointer(e) {
        const had = pointers.has(e.pointerId); pointers.delete(e.pointerId);
        if (scrolling) { if (pointers.size < 2) { scrolling = false; scrollAt = null; } }
        else if (had && downPos !== null) { send({ type: 'mouseup', ...toPage(e) }); downPos = null; }
        e.preventDefault();
      }
      canvas.addEventListener('pointerup', endPointer);
      canvas.addEventListener('pointercancel', endPointer);
      canvas.addEventListener('wheel', (e) => { // desktop trackpad / mouse
        const p = toPage(e); send({ type: 'wheel', ...p, deltaX: e.deltaX, deltaY: e.deltaY }); e.preventDefault();
      }, { passive: false });

      // keyboard (relayed while this tab is focused)
      function relayKey(e, action) {
        // let the resume button and browser shortcuts work
        if (e.target === resumeBtn) return;
        send({ type: 'key', action, key: e.key, code: e.code, keyCode: e.keyCode,
          text: e.key.length === 1 ? e.key : '', shift: e.shiftKey, ctrl: e.ctrlKey, alt: e.altKey, meta: e.metaKey });
        if (['Tab', ' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
      }
      window.addEventListener('keydown', (e) => relayKey(e, 'down'));
      window.addEventListener('keyup', (e) => relayKey(e, 'up'));

      resumeBtn.addEventListener('click', () => { send({ type: 'resume' }); resumeBtn.disabled = true; resumeBtn.textContent = 'Resuming…'; });

      // ---- socket ---------------------------------------------------------
      function connect() {
        ws = new WebSocket(`${proto}://${location.host}/ws?token=${token}`);
        ws.onopen = () => { dot.className = 'live'; resumeBtn.disabled = false; };
        ws.onclose = () => { if (!done) { dot.className = ''; setTimeout(connect, 1000); } };
        ws.onmessage = (ev) => {
          const m = JSON.parse(ev.data);
          if (m.type === 'hello') {
            const tab = m.page && (m.page.title || m.page.url);
            reasonEl.textContent = (m.reason || 'Human verification required') + (tab ? ' — ' + tab : ''); }
          else if (m.type === 'frame') onFrame(m.data, m.metadata);
          else if (m.type === 'resumed') { done = true; dot.className = 'done';
            reasonEl.textContent = 'Handed back to the agent. You can close this tab.';
            resumeBtn.disabled = true; resumeBtn.textContent = 'Done ✓'; ws.close(); }
        };
      }
      connect();
    </script>
  </body>
</html>
